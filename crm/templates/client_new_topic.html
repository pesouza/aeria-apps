<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Novo Tópico — Comunidade AerIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body{ font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0b0e1a,#12182b); color:#e0e0e0; min-height:100vh; }
    .topbar{ background:rgba(11,14,26,.85); backdrop-filter:blur(12px); padding:16px 32px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,.06); }
    .brand{ font-size:22px; font-weight:800; background:linear-gradient(135deg,#7c3aed,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .container{ max-width:640px; margin:0 auto; padding:32px 20px; }
    h1{ font-size:22px; font-weight:700; margin-bottom:24px; }
    .form-group{ margin-bottom:16px; }
    label{ display:block; font-size:13px; font-weight:600; color:#94a3b8; margin-bottom:6px; }
    input,select,textarea{ width:100%; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:8px; padding:12px; color:#e0e0e0; font-family:'Inter',sans-serif; font-size:14px; }
    input:focus,select:focus,textarea:focus{ outline:none; border-color:#7c3aed; }
    textarea{ min-height:120px; resize:vertical; }
    select{ cursor:pointer; }
    select option{ background:#12182b; }
    .btn-primary{ background:linear-gradient(135deg,#7c3aed,#a78bfa); color:#fff; padding:12px 24px; border-radius:8px; font-weight:600; font-size:14px; border:none; cursor:pointer; width:100%; transition:opacity .2s; }
    .btn-primary:hover{ opacity:.9; }
    .flash{ padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; }
    .flash.success{ background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.3); color:#4ade80; }
    .flash.warning{ background:rgba(234,179,8,.15); border:1px solid rgba(234,179,8,.3); color:#facc15; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="brand">AerIA</div>
</div>
<div class="container">
  <h1>➕ Novo Tópico</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="post">
    <div class="form-group">
      <label>Título</label>
      <input type="text" name="title" placeholder="Ex: Como otimizar meu agente de pesquisa?" required>
    </div>
    <div class="form-group">
      <label>Categoria</label>
      <select name="category">
        <option value="geral">💬 Geral</option>
        <option value="cases">🏆 Cases de Sucesso</option>
        <option value="cursos">📚 Cursos</option>
        <option value="ideias">💡 Ideias</option>
      </select>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea name="description" placeholder="Explique sua dúvida, ideia ou case em detalhes..." required></textarea>
    </div>
    <button type="submit" class="btn-primary">Criar Tópico</button>
  </form>
  <p style="text-align:center;margin-top:16px;">
    <a href="{{ url_for('community_index') }}" style="color:#94a3b8;font-size:13px;">← Voltar</a>
  </p>
</div>
</body>
</html>
