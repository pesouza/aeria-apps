services:
  app:
    build: .
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL:-https://aeria-apps.com.br}
      ADSENSE_CLIENT_ID: ${ADSENSE_CLIENT_ID:-}
      CONTENT_FILE: /data/content.json
    volumes:
      - .:/app
      - ./data:/app/data
      - /opt/data/profiles/paulo-bot/indica-aqui:/data/indica-aqui
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.aeria.rule=Host(`aeria-apps.com.br`) || Host(`www.aeria-apps.com.br`)
      - traefik.http.routers.aeria.entrypoints=websecure
      - traefik.http.routers.aeria.tls.certresolver=letsencrypt
      - traefik.http.services.aeria.loadbalancer.server.port=8000
    networks:
      - traefik

networks:
  traefik:
    external: true
