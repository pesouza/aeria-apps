{% extends 'base.html' %}
{% block body %}
<main style="display:grid;place-items:center;min-height:80vh;padding:40px 20px;text-align:center">
  <div>
    <h1 style="font-size:clamp(72px,12vw,140px);letter-spacing:-0.08em;margin:0;background:linear-gradient(135deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">404</h1>
    <p style="color:var(--muted-strong);font-size:20px;margin:12px 0 32px;max-width:500px">Página não encontrada. Ela pode ter sido movida ou não existe.</p>
    <a href="/" class="btn primary" style="text-decoration:none">Voltar ao início</a>
  </div>
</main>
{% endblock %}
